# USB Battery Reporting for dongle
CONFIG_ZMK_USB_HID_BATTERY_REPORTING=y
CONFIG_ZMK_USB_HID_BATTERY_REPORTING_SPLIT=y

# Enable second HID device for battery reporting
CONFIG_USB_HID_DEVICE_COUNT=2

# Required: Enable battery level fetching from peripherals
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
